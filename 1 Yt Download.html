<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Downloader - GitHub Version</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0f0f0f;
color:#fff;
min-height:100vh;
padding:20px;
}

.app{
max-width:480px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
width:85px;
height:85px;
background:linear-gradient(135deg,#ff0000,#ff4d4d);
margin:auto;
border-radius:28px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
box-shadow:0 10px 30px rgba(255,0,0,.4);
}

.header h1{
margin-top:16px;
font-size:30px;
font-weight:700;
}

.header p{
margin-top:8px;
font-size:13px;
color:#aaa;
}

.inputBox{
background:#1b1b1b;
padding:18px;
border-radius:24px;
}

.inputBox input{
width:100%;
height:58px;
border:none;
outline:none;
background:#242424;
border-radius:16px;
padding:0 18px;
font-size:15px;
color:white;
}

.convertBtn{
width:100%;
height:56px;
border:none;
border-radius:16px;
margin-top:16px;
background:linear-gradient(135deg,#ff0000,#ff4d4d);
font-size:16px;
font-weight:600;
color:white;
cursor:pointer;
}

.loading{
display:none;
text-align:center;
margin-top:18px;
font-size:14px;
color:#aaa;
}

.result{
display:none;
margin-top:25px;
}

.videoCard{
background:#1b1b1b;
padding:18px;
border-radius:24px;
}

.thumb{
width:100%;
border-radius:18px;
margin-bottom:15px;
}

.videoTitle{
font-size:15px;
font-weight:600;
}

.sectionTitle{
margin-top:22px;
margin-bottom:14px;
font-size:15px;
font-weight:600;
color:#ddd;
}

.links{
display:flex;
flex-direction:column;
gap:12px;
}

.link{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-radius:16px;
text-decoration:none;
color:white;
background:#242424;
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:42px;
height:42px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:700;
}

.mp4Icon{
background:#2962ff22;
color:#82b1ff;
}

.info h3{
font-size:14px;
font-weight:600;
}

.info p{
font-size:11px;
color:#999;
}

.download{
font-size:12px;
font-weight:600;
padding:8px 12px;
border-radius:50px;
background:#333;
}

.footer{
text-align:center;
margin-top:25px;
font-size:12px;
color:#777;
}

.note{
background:#ff000022;
padding:12px;
border-radius:16px;
margin-top:15px;
font-size:12px;
text-align:center;
}
</style>
</head>
<body>

<div class="app">

<div class="header">
<div class="logo">▶</div>
<h1>YT Downloader</h1>
<p>GitHub Pages Version</p>
</div>

<div class="inputBox">
<input type="text" id="ytLink" placeholder="Paste YouTube URL" value="https://youtu.be/TmRgK-pXH9c">
<button class="convertBtn" onclick="loadVideo()">Download Now</button>
<div class="loading" id="loading">⏳ Getting links...</div>
</div>

<div class="result" id="result">
<div class="videoCard">
<img id="thumb" class="thumb">
<div class="videoTitle" id="title">Loading...</div>
<div class="sectionTitle">📥 Download Options</div>
<div class="links" id="links"></div>
</div>
</div>

<div class="footer">
⚡ Works on GitHub Pages
</div>
<div class="note">
ℹ️ Using public API • No server needed
</div>
</div>

<script>
function getVideoID(url){
if(!url) return null;
if(url.includes("youtu.be/")){
return url.split("youtu.be/")[1].split("?")[0];
}
if(url.includes("v=")){
return url.split("v=")[1].split("&")[0];
}
if(url.includes("shorts/")){
return url.split("shorts/")[1].split("?")[0];
}
return null;
}

async function loadVideo(){
const input = document.getElementById("ytLink").value.trim();
if(!input){
alert("Paste YouTube link");
return;
}

const id = getVideoID(input);
if(!id){
alert("Invalid YouTube link");
return;
}

document.getElementById("loading").style.display = "block";
document.getElementById("result").style.display = "none";

document.getElementById("thumb").src = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
document.getElementById("title").innerHTML = `🎬 Video ID: ${id}`;

const linksContainer = document.getElementById("links");
linksContainer.innerHTML = '<div style="text-align:center;padding:20px;">🔍 Fetching download links...</div>';

try {
// GitHub এ PHP না থাকায় অন্য API ব্যবহার করছি
const response = await fetch(`https://p.oceansaver.in/ajax/download.php?format=mp4&url=https://www.youtube.com/watch?v=${id}&api=2`);
const data = await response.json();

if(data && data.links && data.links.length > 0){
linksContainer.innerHTML = "";

// Different qualities
const qualities = [
{ label: "MP4 360p", quality: "360" },
{ label: "MP4 720p", quality: "720" },
{ label: "MP4 1080p", quality: "1080" }
];

for(let q of qualities){
const link = document.createElement("a");
link.className = "link";
link.href = `https://p.oceansaver.in/download.php?link=${encodeURIComponent(data.links[0].link)}&quality=${q.quality}`;
link.target = "_blank";
link.innerHTML = `
<div class="left">
<div class="icon mp4Icon">MP4</div>
<div class="info">
<h3>${q.label}</h3>
<p>Video Download</p>
</div>
</div>
<div class="download">Download</div>
`;
linksContainer.appendChild(link);
}

// MP3 option
const mp3Link = document.createElement("a");
mp3Link.className = "link";
mp3Link.href = `https://p.oceansaver.in/ajax/download.php?format=mp3&url=https://www.youtube.com/watch?v=${id}`;
mp3Link.target = "_blank";
mp3Link.innerHTML = `
<div class="left">
<div class="icon mp4Icon">MP3</div>
<div class="info">
<h3>MP3 Audio</h3>
<p>128kbps Quality</p>
</div>
</div>
<div class="download">Download</div>
`;
linksContainer.appendChild(mp3Link);

document.getElementById("title").innerHTML = `🎬 ${data.title || 'Video Ready'}`;

} else {
linksContainer.innerHTML = '<div style="text-align:center;color:#ff6666;">❌ No links found! Try another video.</div>';
}

} catch(error){
linksContainer.innerHTML = '<div style="text-align:center;color:#ff6666;">❌ Failed! Try again or use different video.</div>';
}

document.getElementById("loading").style.display = "none";
document.getElementById("result").style.display = "block";
}

document.getElementById("ytLink").addEventListener("keypress", function(e){
if(e.key === "Enter") loadVideo();
});
</script>

</body>
</html>
