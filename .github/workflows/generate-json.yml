name: Generate File List JSON

on:
  push:
    branches:
      - main # আপনার মেইন ব্রাঞ্চের নাম যদি master হয়, তবে এখানে master লিখবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate JSON List
      run: |
        echo "[" > filelist.json
        # রিপোজিটরির সব ফাইল খুঁজে (লুপ চালিয়ে) JSON ফরম্যাটে সাজানো
        # .git এবং .github ফোল্ডার বাদ দিয়ে বাকি সব ফাইলের পাথ নেওয়া হচ্ছে
        find . -type f ! -path './.git*' ! -path './.github*' ! -name 'filelist.json' ! -name 'README.md' | sort | sed 's|^\./||' | while read -r file; do
          echo "  \"$file\"," >> filelist.json
        done
        # শেষের অতিরিক্ত কমা (,) বাদ দিয়ে JSON শেষ করা
        if [ -s filelist.json ]; then
          sed -i '$ s/,$//' filelist.json
        fi
        echo "]" >> filelist.json

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add filelist.json
        # যদি ফাইলে কোনো পরিবর্তন না হয় তবে এরর এড়াতে এটি ব্যবহার করা হয়েছে
        git diff-index --quiet HEAD || git commit -m "Auto-generated filelist.json"
        git push
