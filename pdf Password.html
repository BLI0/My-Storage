<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF পাসওয়ার্ড প্রটেক্টর (অফলাইন)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        
        label {
            font-weight: 600;
            color: #555;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="file"] {
            background-color: #f9f9f9;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #0b5ed7;
        }

        button:disabled {
            background-color: #8bb9fe;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #198754;
        }

        .error {
            color: #dc3545;
        }

        #downloadLink {
            display: none;
            text-align: center;
            background-color: #198754;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        #downloadLink:hover {
            background-color: #157347;
        }
    </style>
    
    <script src="https://unpkg.com/@neslinesli93/qpdf-wasm@0.3.0/dist/qpdf.js"></script>
</head>
<body>

    <div class="container">
        <h2>পিডিএফ এনক্রিপ্টর</h2>
        
        <label for="pdfInput">পিডিএফ ফাইল নির্বাচন করুন:</label>
        <input type="file" id="pdfInput" accept="application/pdf">
        
        <label for="userPass">ইউজার পাসওয়ার্ড (খোলার জন্য):</label>
        <input type="text" id="userPass" placeholder="যেমন: 1234">
        
        <label for="ownerPass">ওনার পাসওয়ার্ড (এডিট/প্রিন্ট লকের জন্য):</label>
        <input type="text" id="ownerPass" placeholder="যেমন: 123456 (ঐচ্ছিক)">
        
        <button id="processBtn">পাসওয়ার্ড সেট করুন</button>
        
        <div id="status" class="status"></div>
        <a id="downloadLink">লক করা PDF ডাউনলোড করুন</a>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfInput');
            const userPass = document.getElementById('userPass').value;
            let ownerPass = document.getElementById('ownerPass').value;
            const statusDiv = document.getElementById('status');
            const downloadLink = document.getElementById('downloadLink');
            const btn = document.getElementById('processBtn');
            
            // ইনপুট ভ্যালিডেশন
            if (fileInput.files.length === 0) {
                alert('অনুগ্রহ করে একটি PDF ফাইল নির্বাচন করুন।');
                return;
            }
            if (!userPass) {
                alert('অনুগ্রহ করে ইউজার পাসওয়ার্ড দিন।');
                return;
            }
            if (!ownerPass) {
                ownerPass = userPass; // যদি ওনার পাসওয়ার্ড না দেওয়া হয়, তবে ইউজার পাসওয়ার্ডই ব্যবহার হবে
            }

            // ইউজার ইন্টারফেস আপডেট (লোডিং স্টেট)
            btn.disabled = true;
            btn.innerText = "প্রসেস করা হচ্ছে...";
            statusDiv.textContent = "WASM লোড হচ্ছে এবং ফাইল এনক্রিপ্ট হচ্ছে... একটু অপেক্ষা করুন।";
            statusDiv.className = "status";
            downloadLink.style.display = 'none';

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                // QPDF মডিউল ইনিশিয়ালাইজ করা (CDN থেকে .wasm ফাইলটি নিয়ে আসছে)
                const qpdf = await window.Module({
                    locateFile: () => "https://unpkg.com/@neslinesli93/qpdf-wasm@0.3.0/dist/qpdf.wasm",
                    noInitialRun: true
                });
                
                const INPUT_FILENAME = "/input.pdf";
                const OUTPUT_FILENAME = "/output.pdf";
                
                // ইনপুট ফাইলটি Emscripten-এর ভার্চুয়াল ফাইল সিস্টেমে লেখা হলো
                qpdf.FS.writeFile(INPUT_FILENAME, uint8Array);
                
                // QPDF কমান্ড চালানো (256-bit AES এনক্রিপশন)
                // কমান্ডের ফরম্যাট: qpdf --encrypt user_pw owner_pw 256 -- input.pdf output.pdf
                const args = [
                    "--encrypt", 
                    userPass, 
                    ownerPass, 
                    "256", 
                    "--", 
                    INPUT_FILENAME, 
                    OUTPUT_FILENAME
                ];
                
                const exitCode = qpdf.callMain(args);
                
                if (exitCode !== 0) {
                    throw new Error("QPDF প্রসেসিং ব্যর্থ হয়েছে।");
                }
                
                // প্রসেস হওয়া ফাইলটি ভার্চুয়াল ফাইল সিস্টেম থেকে পড়া হলো
                const outputFile = qpdf.FS.readFile(OUTPUT_FILENAME);
                
                // ব্রাউজারে ডাউনলোডের জন্য Blob এবং URL তৈরি করা হলো
                const outputBlob = new Blob([outputFile], { type: "application/pdf" });
                const outputUrl = URL.createObjectURL(outputBlob);
                
                // ডাউনলোড বাটনে ডেটা যুক্ত করা হলো
                downloadLink.href = outputUrl;
                downloadLink.download = "Protected_" + file.name;
                downloadLink.style.display = "block";
                
                statusDiv.textContent = "সফলভাবে পাসওয়ার্ড সেট করা হয়েছে!";
                
                // ব্রাউজারের মেমোরি খালি করার জন্য ভার্চুয়াল ফাইল মুছে ফেলা হলো
                qpdf.FS.unlink(INPUT_FILENAME);
                qpdf.FS.unlink(OUTPUT_FILENAME);
                
            } catch (error) {
                console.error(error);
                statusDiv.textContent = "দুঃখিত! ফাইল প্রসেস করতে সমস্যা হয়েছে।";
                statusDiv.className = "status error";
            } finally {
                // প্রসেস শেষে বাটন আবার স্বাভাবিক অবস্থায় ফিরিয়ে আনা হলো
                btn.disabled = false;
                btn.innerText = "পাসওয়ার্ড সেট করুন";
            }
        });
    </script>
</body>
</html>
