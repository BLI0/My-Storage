<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF পাসওয়ার্ড প্রটেক্টর (অফলাইন)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }
        
        label {
            font-weight: 600;
            color: #555;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        button:hover {
            background-color: #0b5ed7;
        }

        button:disabled {
            background-color: #8bb9fe;
            cursor: not-allowed;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #198754;
        }

        .error {
            color: #dc3545;
        }

        /* নতুন Error Details বক্স */
        #errorDetails {
            margin-top: 15px;
            padding: 10px;
            background-color: #ffe6e6;
            color: #d8000c;
            border: 1px solid #d8000c;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            word-wrap: break-word;
            display: none;
        }

        #downloadLink {
            display: none;
            text-align: center;
            background-color: #198754;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@neslinesli93/qpdf-wasm@0.3.0/dist/qpdf.js"></script>
</head>
<body>

    <div class="container">
        <h2>পিডিএফ এনক্রিপ্টর</h2>
        
        <label for="pdfInput">পিডিএফ ফাইল নির্বাচন করুন:</label>
        <input type="file" id="pdfInput" accept="application/pdf">
        
        <label for="userPass">ইউজার পাসওয়ার্ড:</label>
        <input type="text" id="userPass" placeholder="যেমন: 1234">
        
        <label for="ownerPass">ওনার পাসওয়ার্ড:</label>
        <input type="text" id="ownerPass" placeholder="যেমন: 123456">
        
        <button id="processBtn">পাসওয়ার্ড সেট করুন</button>
        
        <div id="status" class="status"></div>
        
        <div id="errorDetails"></div>
        
        <a id="downloadLink">লক করা PDF ডাউনলোড করুন</a>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfInput');
            const userPass = document.getElementById('userPass').value;
            let ownerPass = document.getElementById('ownerPass').value;
            const statusDiv = document.getElementById('status');
            const errorDetails = document.getElementById('errorDetails');
            const downloadLink = document.getElementById('downloadLink');
            const btn = document.getElementById('processBtn');
            
            // ইনপুট ভ্যালিডেশন
            if (fileInput.files.length === 0) {
                alert('অনুগ্রহ করে একটি PDF ফাইল নির্বাচন করুন।');
                return;
            }
            if (!userPass) {
                alert('অনুগ্রহ করে ইউজার পাসওয়ার্ড দিন।');
                return;
            }
            if (!ownerPass) ownerPass = userPass;

            // UI আপডেট
            btn.disabled = true;
            btn.innerText = "প্রসেস করা হচ্ছে...";
            statusDiv.textContent = "ফাইল প্রসেস হচ্ছে, দয়া করে অপেক্ষা করুন...";
            statusDiv.className = "status";
            errorDetails.style.display = 'none';
            downloadLink.style.display = 'none';

            try {
                const file = fileInput.files[0];
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                // WASM ফাইল ইনিশিয়ালাইজেশন
                if (typeof window.Module !== 'function') {
                    throw new Error("WASM মডিউল ঠিকমতো লোড হয়নি। 'window.Module is not a function'");
                }

                const qpdf = await window.Module({
                    locateFile: (path) => {
                        if (path.endsWith('.wasm')) {
                            return "https://cdn.jsdelivr.net/npm/@neslinesli93/qpdf-wasm@0.3.0/dist/qpdf.wasm";
                        }
                        return path;
                    },
                    noInitialRun: true
                });
                
                const INPUT_FILENAME = "/input.pdf";
                const OUTPUT_FILENAME = "/output.pdf";
                
                // ফাইল লেখা
                qpdf.FS.writeFile(INPUT_FILENAME, uint8Array);
                
                // QPDF কমান্ড
                const args = [
                    "--encrypt", 
                    userPass, 
                    ownerPass, 
                    "256", 
                    "--", 
                    INPUT_FILENAME, 
                    OUTPUT_FILENAME
                ];
                
                const exitCode = qpdf.callMain(args);
                
                if (exitCode !== 0) {
                    throw new Error(`QPDF কমান্ড ব্যর্থ হয়েছে! Exit Code: ${exitCode}`);
                }
                
                // ফাইল পড়া এবং ডাউনলোড
                const outputFile = qpdf.FS.readFile(OUTPUT_FILENAME);
                const outputBlob = new Blob([outputFile], { type: "application/pdf" });
                const outputUrl = URL.createObjectURL(outputBlob);
                
                downloadLink.href = outputUrl;
                downloadLink.download = "Protected_" + file.name;
                downloadLink.style.display = "block";
                
                statusDiv.textContent = "সফলভাবে পাসওয়ার্ড সেট করা হয়েছে!";
                
                // মেমোরি ক্লিয়ার
                qpdf.FS.unlink(INPUT_FILENAME);
                qpdf.FS.unlink(OUTPUT_FILENAME);
                
            } catch (error) {
                console.error(error);
                statusDiv.textContent = "প্রসেস করতে সমস্যা হয়েছে!";
                statusDiv.className = "status error";
                
                // আসল এরর মেসেজটি বক্সে দেখানো হবে
                errorDetails.style.display = 'block';
                errorDetails.innerText = "Error Details:\n" + (error.message || error);
            } finally {
                btn.disabled = false;
                btn.innerText = "পাসওয়ার্ড সেট করুন";
            }
        });
    </script>
</body>
</html>
